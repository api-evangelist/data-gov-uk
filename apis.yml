aid: data-gov-uk
name: UK Government Open Data
description: >-
  UK Government Open Data is a national government open-data portal for United Kingdom running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 57,791 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
kind: government
