apis:
  - aid: data-gov-uk:catalog
    name: UK Government Open Data CKAN Action API
    description: >-
      CKAN Action API for UK Government Open Data, a consistent JSON-over-HTTP interface over a catalog of 57,791 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://www.data.gov.uk/api/3/action/.
    humanURL: https://www.data.gov.uk
    baseURL: https://www.data.gov.uk/api/3/action
